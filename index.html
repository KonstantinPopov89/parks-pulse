<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e13">
<title>Пульс парков</title>
<style>
  :root{
    --bg:#0b0e13; --bg2:#0e1219; --card:#151b24; --card2:#1a212c;
    --bd:#232c39; --bd2:#2c3848;
    --tx:#e6edf3; --mut:#8b97a7; --mut2:#5d6776;
    --up:#3fb950; --upbg:rgba(63,185,80,.13);
    --dn:#f85149; --dnbg:rgba(248,81,73,.13);
    --warn:#e3b341; --warnbg:rgba(227,179,65,.13);
    --acc:#58a6ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums}
  .wrap{max-width:480px;margin:0 auto;padding:14px 12px 40px}

  .top{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px}
  .ttl{display:flex;align-items:baseline;gap:9px}
  .ttl h1{font-size:20px;margin:0;letter-spacing:.2px;font-weight:700}
  .upd{font-size:11px;color:var(--mut);text-align:right;line-height:1.45}
  .live{display:inline-flex;align-items:center;gap:5px;color:var(--up);font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 0 0 rgba(63,185,80,.6);
    animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.55)}70%{box-shadow:0 0 0 7px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

  .agg{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--bd);
    border-radius:14px;padding:11px 13px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .agg .lbl{font-size:11.5px;color:var(--mut);margin-bottom:3px}
  .agg .big{font-size:21px;font-weight:750;letter-spacing:.2px}
  .agg .rt{text-align:right;font-size:12px;color:var(--mut);line-height:1.5;white-space:nowrap;flex:none}
  .agg .rt b{color:var(--up);font-size:15px}

  .pager{display:flex;align-items:center;justify-content:center;gap:11px;margin:0 0 6px}
  .pgname{font-size:13.5px;font-weight:700;transition:color .2s}
  .dots{display:flex;gap:6px;align-items:center}
  .dot2{width:7px;height:7px;border-radius:50%;background:var(--bd2);transition:all .22s;cursor:pointer}
  .dot2.on{width:20px;border-radius:4px}
  .deck{position:relative;margin:0 0 30px}
  .card{position:absolute;top:0;left:0;right:0;background:var(--card);border:1px solid var(--bd);border-radius:16px;
    padding:12px 12px 11px;box-shadow:0 1px 0 rgba(255,255,255,.02) inset;
    transition:transform .34s cubic-bezier(.2,.7,.3,1),opacity .3s;will-change:transform;backface-visibility:hidden}
  .card.ontop{touch-action:none;cursor:grab}
  .card.dragging{transition:none;cursor:grabbing}
  .chead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
  .pname{display:flex;align-items:center;gap:8px;min-width:0}
  .pdot{width:9px;height:9px;border-radius:50%;flex:none}
  .pname h2{font-size:16px;margin:0;font-weight:680;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sys{font-size:9.5px;color:var(--mut2);border:1px solid var(--bd2);border-radius:5px;padding:1px 5px;flex:none}
  .pill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px;white-space:nowrap;flex:none}
  .pill.up{color:var(--up);background:var(--upbg)} .pill.dn{color:var(--dn);background:var(--dnbg)}
  .pill.fl{color:var(--mut);background:rgba(139,151,167,.12)}

  .hero{margin:2px 1px 6px}
  .hval{font-size:30px;font-weight:780;letter-spacing:.3px;line-height:1}
  .hsub{font-size:11px;color:var(--mut);margin-top:5px}
  .chips{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 0 9px}
  .chip{font-size:11px;border:1px solid var(--bd2);border-radius:9px;padding:5px 3px;line-height:1.2;text-align:center}
  .chip .k{color:var(--mut2);font-size:9.5px;display:block;margin-bottom:1px}
  .chip .v{font-weight:700}
  .chip .v.up{color:var(--up)} .chip .v.dn{color:var(--dn)} .chip .v.fl{color:var(--mut)}
  .chip.an{opacity:.5}
  .anote{font-size:9px;color:var(--mut2);margin:-5px 2px 9px;line-height:1.3}
  .yoy{display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr;gap:3px 6px;margin-top:10px;align-items:center}
  .yoy .yc1{font-size:9px;color:var(--mut2);text-transform:uppercase;letter-spacing:.4px}
  .yoy .yh{font-size:9.5px;color:var(--mut2);text-align:center}
  .yoy .yl{font-size:10.5px;color:var(--mut)}
  .yoy .yv{font-size:11px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums}
  .yoy .yv.up{color:var(--up)} .yoy .yv.dn{color:var(--dn)} .yoy .yv.fl{color:var(--mut2)}

  .chart{width:100%;height:96px;display:block;margin:2px 0 3px}
  .leg{display:flex;gap:13px;flex-wrap:wrap;font-size:10px;color:var(--mut);margin:0 2px 10px}
  .leg i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .lk{width:14px;height:0;border-top-width:2.5px;border-top-style:solid;display:inline-block}

  .grid{display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:8px;margin-top:2px}
  .tile{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:8px 9px}
  .tk{font-size:10px;color:var(--mut);margin-bottom:5px}
  .tv{font-size:15px;font-weight:720;line-height:1}
  .tnote{font-size:10.5px;margin-top:4px;color:var(--mut)}
  .tnote.up{color:var(--up)} .tnote.dn{color:var(--dn)}
  .spark{display:flex;align-items:flex-end;gap:2px;height:30px;margin-bottom:5px}
  .spark span{flex:1;background:var(--bd2);border-radius:2px 2px 0 0;min-height:2px}
  .spark span.hl{background:var(--acc)}

  .wx{display:flex;align-items:center;gap:10px;margin-top:9px;padding:9px 11px;border-radius:11px;border:1px solid var(--bd)}
  .wx.up{background:var(--upbg)} .wx.fl{background:rgba(139,151,167,.07)} .wx.dn{background:var(--warnbg)}
  .wxic{font-size:23px;line-height:1;flex:none}
  .wxm{flex:1;min-width:0}
  .wxt{font-size:13px;font-weight:680}
  .wxn{font-size:11px;color:var(--mut);margin-top:2px}
  .wbadge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;flex:none}
  .wbadge.up{color:var(--up);background:rgba(63,185,80,.16)}
  .wbadge.fl{color:var(--mut);background:rgba(139,151,167,.16)}
  .wbadge.dn{color:var(--warn);background:rgba(227,179,65,.18)}

  .err{color:var(--dn);font-size:12px;padding:6px 2px}
  .foot{font-size:10.5px;color:var(--mut2);text-align:center;margin-top:18px;line-height:1.6}
  .banner{background:var(--dnbg);color:var(--dn);border:1px solid var(--dn);border-radius:10px;padding:9px 12px;font-size:12px;margin-bottom:12px;display:none}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .gate.hidden{display:none}
  .gatebox{width:100%;max-width:320px;text-align:center}
  .gtitle{font-size:22px;font-weight:700;margin-bottom:6px}
  .gsub{font-size:13px;color:var(--mut);margin-bottom:18px}
  #gpass{width:100%;padding:12px 14px;font-size:16px;border-radius:11px;border:1px solid var(--bd2);background:var(--card);color:var(--tx);margin-bottom:10px;outline:none}
  #gpass:focus{border-color:var(--acc)}
  #gbtn{width:100%;padding:12px;font-size:15px;font-weight:700;border:none;border-radius:11px;background:var(--acc);color:#0b0e13;cursor:pointer}
  .gerr{color:var(--dn);font-size:12px;margin-top:10px;min-height:16px}
</style>
</head>
<body>
<div class="gate" id="gate">
  <form class="gatebox" onsubmit="return false">
    <div class="gtitle">Пульс парков</div>
    <div class="gsub">Введите пароль для просмотра</div>
    <input id="gpass" type="password" inputmode="text" autocomplete="current-password" placeholder="пароль" autofocus>
    <button id="gbtn" type="button">Открыть</button>
    <div class="gerr" id="gerr"></div>
  </form>
</div>
<div class="wrap">
  <div class="top">
    <div class="ttl"><h1>Пульс парков</h1></div>
    <div class="upd"><span class="live"><span class="dot"></span>live</span><br><span id="updRel">—</span><br>обновление каждые 15 мин</div>
  </div>
  <div class="banner" id="banner"></div>
  <div class="agg">
    <div><div class="lbl">Выручка сегодня · <span id="aggN">—</span> парка</div><div class="big" id="aggSum">—</div></div>
    <div class="rt" id="aggCnt">—</div>
  </div>
  <div class="pager"><span class="pgname" id="pgName">—</span><div class="dots" id="dots"></div></div>
  <div id="cards" class="deck"></div>
  <div class="foot">«Темп дня» = накопленная выручка от открытия до текущего времени суток,<br>сравнение с тем же отрезком вчера / −7 / −14 / −21 день</div>
</div>

<script>
const REF=[["вчера","d1"],["−7д","d7"],["−14д","d14"],["−21д","d21"]];
const rub=n=>Math.round(n).toLocaleString("ru-RU")+" ₽";
const pct=(a,b)=>b?((a-b)/b*100):0;
const sgn=v=>v>=0?"up":"dn";
const arr=v=>Math.abs(v)<0.5?"≈":(v>0?"▲":"▼");
const fpct=v=>Math.abs(v)<0.5?"0%":(v>0?"+":"")+v.toFixed(0)+"%";
const clk=m=>Math.floor(m/60)+":"+String(m%60).padStart(2,"0");

function chart(p){
  const s=p.series, g=s.grid, W=440,H=118,pL=6,pR=10,pT=8,pB=18;
  let maxY=0; [s.today,s.hi,s.d1].forEach(a=>a.forEach(v=>{if(v>maxY)maxY=v;})); maxY=(maxY||1)*1.08;
  const gx0=g[0], gx1=g[g.length-1]||(gx0+1);
  const X=m=>pL+(gx1>gx0?(m-gx0)/(gx1-gx0):0)*(W-pL-pR);
  const Y=v=>H-pB-(v/maxY)*(H-pT-pB);
  const path=a=>a.map((v,i)=>(i?"L":"M")+X(g[i]).toFixed(1)+" "+Y(v).toFixed(1)).join(" ");
  const band="M"+s.hi.map((v,i)=>X(g[i]).toFixed(1)+" "+Y(v).toFixed(1)).join(" L ")
            +" L "+s.lo.map((v,i)=>[i,v]).reverse().map(([i,v])=>X(g[i]).toFixed(1)+" "+Y(v).toFixed(1)).join(" L ")+" Z";
  const ex=X(gx1), ey=Y(s.today[s.today.length-1]);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="${band}" fill="${p.accent}" opacity="0.13"/>
    <path d="${path(s.med)}" fill="none" stroke="${p.accent}" stroke-opacity="0.5" stroke-width="1.4"/>
    <path d="${path(s.d1)}" fill="none" stroke="#8b97a7" stroke-width="1.4" stroke-dasharray="2 3"/>
    <path d="${path(s.today)}" fill="none" stroke="${p.accent}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="4.5" fill="${p.accent}"/>
    <text x="${pL}" y="${H-5}" fill="#5d6776" font-size="10">${clk(gx0)}</text>
    <text x="${W-pR}" y="${H-5}" fill="#8b97a7" font-size="10" text-anchor="end">сейчас ${clk(p.now_min)}</text>
  </svg>`;
}
function sparkline(vals){
  const mx=Math.max(...vals)||1;
  return `<div class="spark">`+vals.map((v,i)=>`<span class="${i===vals.length-1?'hl':''}" style="height:${Math.max(8,v/mx*100)}%"></span>`).join("")+`</div>`;
}
function card(p){
  if(p.error) return `<div class="card"><div class="chead"><div class="pname"><h2>${p.name}</h2></div></div><div class="err">данные недоступны: ${p.error}</div></div>`;
  const te=p.today_end;
  const norm=(p.series.med&&p.series.med.length)?p.series.med[p.series.med.length-1]:0;
  const nv=norm?pct(te,norm):0;
  const pillCls=Math.abs(nv)<2?"fl":sgn(nv);
  const chips=REF.map(([lbl,key])=>{const v=pct(te,p.refs[key]);const an=p.refs_anom&&p.refs_anom[key];const c=an?"fl":(Math.abs(v)<1.5?"fl":sgn(v));
     return `<div class="chip${an?' an':''}"><span class="k">${lbl}${an?' *':''}</span><span class="v ${c}">${fpct(v)}</span></div>`;}).join("");
  const anomNote = REF.some(([_,k])=>p.refs_anom&&p.refs_anom[k]) ? `<div class="anote">* опорный день аномально низкий (вероятно закрытие) — исключён из «нормы»</div>` : "";
  const wk=p.weekly;
  const wkTile = wk && wk.values && wk.values.length
    ? `${sparkline(wk.values)}<div class="tnote ${wk.wow!=null?sgn(wk.wow):''}">${wk.values[wk.values.length-1].toFixed(1)} млн ₽${wk.wow!=null?` · ${arr(wk.wow)}${Math.abs(wk.wow)}%`:""}</div>`
    : `<div class="tv" style="color:var(--mut2)">н/д</div>`;
  const checkTile = p.check!=null ? `<div class="tv">${p.check.toLocaleString("ru-RU")} ₽</div>` : `<div class="tv" style="color:var(--mut2)">н/д</div>`;
  const topupTile = p.topup!=null ? `<div class="tv">${p.topup.toLocaleString("ru-RU")} ₽</div>` : `<div class="tv" style="color:var(--mut2)">н/д</div>`;
  const wx=p.weather;
  const wxStrip = wx ? `<div class="wx ${wx.sig}"><div class="wxic">${wx.ic}</div>
      <div class="wxm"><div class="wxt">${wx.t} · ${wx.w}</div><div class="wxn">${wx.note}</div></div>
      <div class="wbadge ${wx.sig}">${wx.sig==="up"?"помогает":wx.sig==="dn"?"мешает":"нейтрально"}</div></div>` : "";
  return `<div class="card">
    <div class="chead">
      <div class="pname"><span class="pdot" style="background:${p.accent}"></span><h2>${p.name}</h2><span class="sys">${p.sys}</span></div>
      <span class="pill ${pillCls}">${arr(nv)} ${fpct(nv)} к норме</span>
    </div>
    <div class="hero"><div class="hval">${rub(te)}</div><div class="hsub">к ${clk(p.now_min)} · сегодня</div></div>
    <div class="chips">${chips}</div>${anomNote}
    ${chart(p)}
    <div class="leg">
      <i><span class="lk" style="border-color:${p.accent};width:16px"></span>сегодня</i>
      <i><span class="lk" style="border-color:${p.accent};opacity:.5"></span>норма −7/14/21д</i>
      <i><span class="lk" style="border-color:#8b97a7;border-top-style:dashed"></span>вчера</i>
    </div>
    <div class="grid">
      <div class="tile"><div class="tk">Выручка по неделям</div>${wkTile}</div>
      <div class="tile"><div class="tk">Средний чек</div>${checkTile}</div>
      <div class="tile"><div class="tk">Пополнение/день</div>${topupTile}</div>
    </div>
    ${yoyTable(p.yoy)}
    ${wxStrip}
  </div>`;
}

function yoyTable(yoy){
  if(!yoy) return "";
  const cols=[["day","День"],["week","Нед"],["month","Мес"],["ytd","Год"]];
  const rows=[["revenue","Выручка"],["check","Чек"],["topup","Пополн."]];
  const cell=v=>{const c=(v==null)?"fl":(Math.abs(v)<1?"fl":(v>0?"up":"dn"));const t=(v==null)?"—":(v>0?"+":"")+v+"%";return `<div class="yv ${c}">${t}</div>`;};
  let h=`<div class="yoy"><div class="yc1">к ’25</div>`+cols.map(c=>`<div class="yh">${c[1]}</div>`).join("");
  for(const [mk,ml] of rows){ h+=`<div class="yl">${ml}</div>`+cols.map(c=>cell(yoy[mk]?yoy[mk][c[0]]:null)).join(""); }
  return h+`</div>`;
}

let DECK_TOP=0, DECK_PARKS=[], DECK_BOUND=false;
function restack(){
  const deck=$("cards"), cards=[...deck.children], N=cards.length;
  if(!N) return;
  cards.forEach((el,i)=>{
    const r=((i-DECK_TOP)%N+N)%N;
    el.classList.toggle("ontop", r===0);
    if(r===0){ el.style.zIndex=30; if(!el.classList.contains("dragging")){el.style.transform="";el.style.opacity="1";} el.style.pointerEvents="auto"; }
    else if(r===1){ el.style.zIndex=20; el.style.transform="scale(.965) translateY(22px)"; el.style.opacity="1"; el.style.pointerEvents="none"; }
    else if(r===2){ el.style.zIndex=10; el.style.transform="scale(.93) translateY(40px)"; el.style.opacity="1"; el.style.pointerEvents="none"; }
    else { el.style.zIndex=0; el.style.transform="scale(.93) translateY(40px)"; el.style.opacity="0"; el.style.pointerEvents="none"; }
  });
  const topEl=cards[DECK_TOP]; if(topEl) deck.style.height=(topEl.offsetHeight+44)+"px";
  const dots=$("dots"), p=DECK_PARKS[DECK_TOP]||{};
  [...dots.children].forEach((d,j)=>{const on=j===DECK_TOP;d.classList.toggle("on",on);d.style.background=on?(DECK_PARKS[j]||{}).accent:"";});
  $("pgName").textContent=p.name||""; $("pgName").style.color=p.accent||"var(--tx)";
}
function deckGo(dir){ const N=DECK_PARKS.length; if(!N)return; DECK_TOP=((DECK_TOP+dir)%N+N)%N; restack(); }
function setupDeck(parks){
  DECK_PARKS=parks; const deck=$("cards"), dots=$("dots");
  if(!parks.length){dots.innerHTML="";$("pgName").textContent="";return;}
  if(DECK_TOP>=parks.length)DECK_TOP=0;
  dots.innerHTML=parks.map((p,i)=>`<span class="dot2" data-i="${i}"></span>`).join("");
  dots.onclick=e=>{const i=e.target.dataset&&e.target.dataset.i; if(i!=null){DECK_TOP=+i; restack();}};
  restack();
  if(!DECK_BOUND){ DECK_BOUND=true; attachDeckDrag(deck); }
}
function attachDeckDrag(deck){
  let card=null,sx=0,sy=0,dx=0,dy=0,on=false;
  deck.addEventListener("pointerdown",e=>{
    const t=deck.querySelector(".card.ontop"); if(!t)return;
    if(e.target.closest&&e.target.closest(".dot2"))return;
    if(!t.contains(e.target))return;
    card=t;sx=e.clientX;sy=e.clientY;dx=dy=0;on=true;card.classList.add("dragging");
    try{card.setPointerCapture(e.pointerId);}catch(_){}
  });
  deck.addEventListener("pointermove",e=>{
    if(!on||!card)return; dx=e.clientX-sx; dy=e.clientY-sy;
    if(Math.abs(dx)>6&&e.cancelable)e.preventDefault();
    card.style.transform=`translate(${dx}px,${(dy*0.55).toFixed(1)}px) rotate(${(dx*0.05).toFixed(2)}deg)`;
  });
  const end=()=>{
    if(!on||!card)return; on=false; card.classList.remove("dragging");
    const TH=Math.min(110,deck.clientWidth*0.3);
    if(Math.abs(dx)>TH){
      const dir=dx<0?1:-1, off=(dx<0?-1:1)*(deck.clientWidth+280), fc=card;
      fc.style.transition="transform .32s ease,opacity .32s";
      fc.style.transform=`translate(${off}px,${(dy*0.55).toFixed(0)}px) rotate(${(dir*-16)}deg)`;
      fc.style.opacity="0";
      setTimeout(()=>{fc.style.transition=""; deckGo(dir);},290);
    } else { card.style.transform=""; card.style.opacity="1"; }
    card=null;
  };
  deck.addEventListener("pointerup",end);
  deck.addEventListener("pointercancel",end);
}

function render(data){
  const parks=data.parks||[];
  document.getElementById("cards").innerHTML=parks.map(card).join("");
  setupDeck(parks);
  const ok=parks.filter(p=>!p.error);
  const sum=ok.reduce((s,p)=>s+p.today_end,0);
  const ahead=ok.filter(p=>p.refs && p.today_end>p.refs.d7).length;
  document.getElementById("aggN").textContent=parks.length;
  document.getElementById("aggSum").textContent=rub(sum);
  document.getElementById("aggCnt").innerHTML=`<b>${ahead} из ${ok.length}</b><br>опережают −7д`;
  const gen=new Date(data.generated);
  const mins=Math.max(0,Math.round((Date.now()-gen.getTime())/60000));
  document.getElementById("updRel").textContent=`обновлено ${gen.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}` + (mins>0?` · ${mins} мин назад`:"");
}

const ENC=new TextEncoder(), DEC=new TextDecoder();
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const $=id=>document.getElementById(id);
async function decryptData(pass){
  const r=await fetch("data.enc?t="+Date.now(),{cache:"no-store"});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const env=await r.json();
  const km=await crypto.subtle.importKey("raw",ENC.encode(pass),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(env.salt),iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(env.iv)},key,b64d(env.ct));
  return JSON.parse(DEC.decode(pt));
}
let PASS=null, timer=null;
async function refresh(){
  if(!PASS) return;
  try{ const data=await decryptData(PASS); $("banner").style.display="none"; render(data); }
  catch(e){ if(e.name==="OperationError") lock("Введите пароль");
            else { $("banner").style.display="block"; $("banner").textContent="Ошибка загрузки: "+e.message; } }
}
function lock(msg){
  PASS=null; localStorage.removeItem("pp_pass");
  if(timer){clearInterval(timer);timer=null;}
  $("gate").classList.remove("hidden"); $("gerr").textContent=msg||""; $("gpass").value=""; $("gpass").focus();
}
async function unlock(pass){
  if(!pass) return;
  $("gerr").textContent="…";
  try{
    const data=await decryptData(pass);
    PASS=pass; localStorage.setItem("pp_pass",pass); $("gerr").textContent="";
    $("gate").classList.add("hidden"); render(data);
    if(!timer) timer=setInterval(refresh,15*60*1000);
  }catch(e){
    $("gerr").textContent = e.name==="OperationError" ? "Неверный пароль" : "Ошибка: "+e.message;
  }
}
(function initGate(){
  if(!(window.crypto&&crypto.subtle)){
    $("gate").innerHTML='<div class="gatebox"><div class="gtitle">Нужен HTTPS</div><div class="gsub">Расшифровка работает только по HTTPS или на localhost. Открой адрес GitHub Pages (https://…).</div></div>';
    return;
  }
  $("gbtn").addEventListener("click",()=>unlock($("gpass").value));
  $("gpass").addEventListener("keydown",e=>{if(e.key==="Enter")unlock($("gpass").value);});
  const saved=localStorage.getItem("pp_pass");
  if(saved) unlock(saved); else lock("");
})();
</script>
